<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LeadBlaster - Bulk Email Outreach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            overflow-x: hidden;
        }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
        
        .input-field {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(71, 85, 105, 0.5);
            color: white;
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            border-color: #6366f1;
            outline: none;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary:active {
            transform: scale(0.95);
        }
        
        .btn-primary::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .btn-primary:active::after {
            width: 300px;
            height: 300px;
        }
        
        .email-item {
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }
        
        .email-item:hover {
            background: rgba(99, 102, 241, 0.1);
            border-left-color: #6366f1;
        }
        
        .email-item.sent {
            background: rgba(34, 197, 94, 0.1);
            border-left-color: #22c55e;
        }
        
        .email-item.pending {
            background: rgba(234, 179, 8, 0.1);
            border-left-color: #eab308;
        }
        
        .progress-bar {
            background: linear-gradient(90deg, #6366f1 0%, #8b5cf6 100%);
            transition: width 0.5s ease;
        }
        
        .template-btn {
            transition: all 0.2s ease;
        }
        
        .template-btn.active {
            background: #6366f1;
            border-color: #6366f1;
        }
        
        .filter-tab {
            transition: all 0.3s ease;
            position: relative;
        }
        
        .filter-tab.active {
            background: rgba(99, 102, 241, 0.2);
            color: #818cf8;
            border-color: #6366f1;
        }
        
        .filter-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: #6366f1;
        }
        
        .status-badge {
            font-size: 0.65rem;
            padding: 0.125rem 0.375rem;
            border-radius: 9999px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .status-pending {
            background: rgba(234, 179, 8, 0.2);
            color: #eab308;
        }
        
        .status-sent {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        
        /* Mobile optimizations for Infinix Hot 50i */
        @media (max-width: 720px) {
            .container-padding {
                padding: 0.75rem;
            }
            
            .mobile-full {
                width: 100%;
            }
            
            .mobile-text-sm {
                font-size: 0.875rem;
            }
            
            .mobile-stack {
                flex-direction: column;
            }
            
            .mobile-gap-2 {
                gap: 0.5rem;
            }
            
            .mobile-scroll-x {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
            }
            
            .mobile-scroll-x::-webkit-scrollbar {
                display: none;
            }
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(30, 41, 59, 0.5);
        }
        
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #6366f1;
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .pulse-ring {
            position: absolute;
            border-radius: 50%;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.33); opacity: 1; }
            80%, 100% { transform: scale(2); opacity: 0; }
        }
        
        .bulk-actions {
            position: sticky;
            bottom: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(71, 85, 105, 0.5);
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Header -->
    <header class="sticky top-0 z-50 glass-panel border-b border-slate-700/50">
        <div class="container-padding max-w-7xl mx-auto py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                    </svg>
                </div>
                <h1 class="text-lg font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">LeadBlaster</h1>
            </div>
            <div class="flex items-center gap-3">
                <div class="text-xs text-slate-400 mobile-text-sm hidden sm:block" id="stats-summary">
                    Ready
                </div>
                <button onclick="resetAll()" class="text-xs text-red-400 hover:text-red-300 transition p-2 rounded-lg hover:bg-red-500/10">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <main class="container-padding max-w-7xl mx-auto py-4 space-y-4 pb-32">
        
        <!-- Quick Stats Cards -->
        <div class="grid grid-cols-3 gap-2 sm:gap-4" id="quickStats" style="display: none;">
            <div class="glass-panel rounded-xl p-3 text-center">
                <div class="text-xl sm:text-2xl font-bold text-white" id="statAll">0</div>
                <div class="text-xs text-slate-400">All</div>
            </div>
            <div class="glass-panel rounded-xl p-3 text-center border-l-2 border-yellow-500">
                <div class="text-xl sm:text-2xl font-bold text-yellow-400" id="statPending">0</div>
                <div class="text-xs text-slate-400">Pending</div>
            </div>
            <div class="glass-panel rounded-xl p-3 text-center border-l-2 border-green-500">
                <div class="text-xl sm:text-2xl font-bold text-green-400" id="statSent">0</div>
                <div class="text-xs text-slate-400">Sent</div>
            </div>
        </div>

        <!-- Input Section -->
        <section class="glass-panel rounded-2xl p-4 space-y-4">
            <h2 class="text-lg font-semibold text-white flex items-center gap-2">
                <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                </svg>
                Recipients <span class="text-xs text-slate-400 font-normal">(Max 10,000)</span>
            </h2>
            
            <!-- Email Input -->
            <div class="space-y-2">
                <textarea 
                    id="emailInput" 
                    placeholder="Paste emails here (one per line or comma separated)&#10;example@email.com&#10;another@email.com"
                    class="input-field w-full h-24 rounded-xl p-3 text-sm resize-none mobile-text-sm"
                ></textarea>
                
                <div class="flex mobile-stack gap-2 justify-between items-center text-xs text-slate-400">
                    <div class="flex gap-4 flex-wrap">
                        <span id="validCount">Valid: 0</span>
                        <span id="invalidCount">Invalid: 0</span>
                        <span id="totalCount" class="text-indigo-400 font-semibold">Total: 0</span>
                    </div>
                    <button onclick="clearEmails()" class="text-red-400 hover:text-red-300 transition text-xs">Clear All</button>
                </div>
            </div>

            <!-- File Upload -->
            <div class="border-2 border-dashed border-slate-600 rounded-xl p-4 text-center hover:border-indigo-500 transition cursor-pointer relative" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept=".csv,.txt" class="hidden" onchange="handleFileUpload(event)">
                <svg class="w-8 h-8 text-slate-400 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                </svg>
                <p class="text-sm text-slate-300 mobile-text-sm">Upload CSV or TXT file</p>
                <p class="text-xs text-slate-500 mt-1">Click to browse files</p>
            </div>
        </section>

        <!-- Message Configuration -->
        <section class="glass-panel rounded-2xl p-4 space-y-4">
            <h2 class="text-lg font-semibold text-white flex items-center gap-2">
                <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                </svg>
                Message Content
            </h2>

            <!-- Subject -->
            <div class="space-y-1">
                <label class="text-xs text-slate-400 uppercase tracking-wider font-medium">Subject Line</label>
                <input 
                    type="text" 
                    id="subjectInput" 
                    placeholder="Enter subject line..."
                    maxlength="200"
                    class="input-field w-full rounded-xl p-3 text-sm"
                >
                <div class="text-right text-xs text-slate-500">
                    <span id="subjectCount">0</span>/200
                </div>
            </div>

            <!-- Message Body -->
            <div class="space-y-1">
                <label class="text-xs text-slate-400 uppercase tracking-wider font-medium">Message Body</label>
                <textarea 
                    id="bodyInput" 
                    placeholder="Enter your message...&#10;Use {name} for personalization (extracts from email)"
                    maxlength="2000"
                    class="input-field w-full h-32 rounded-xl p-3 text-sm resize-none"
                ></textarea>
                <div class="flex justify-between text-xs text-slate-500">
                    <span class="text-indigo-400">Tip: {name} auto-fills from email</span>
                    <span><span id="bodyCount">0</span>/2000</span>
                </div>
            </div>

            <!-- Quick Templates -->
            <div class="space-y-2">
                <label class="text-xs text-slate-400 uppercase tracking-wider font-medium">Quick Templates</label>
                <div class="flex flex-wrap gap-2">
                    <button onclick="loadTemplate('intro')" class="template-btn px-3 py-1.5 rounded-lg border border-slate-600 text-xs text-slate-300 hover:border-indigo-500 hover:text-white transition">
                        Basic Intro
                    </button>
                    <button onclick="loadTemplate('partnership')" class="template-btn px-3 py-1.5 rounded-lg border border-slate-600 text-xs text-slate-300 hover:border-indigo-500 hover:text-white transition">
                        Partnership
                    </button>
                    <button onclick="loadTemplate('followup')" class="template-btn px-3 py-1.5 rounded-lg border border-slate-600 text-xs text-slate-300 hover:border-indigo-500 hover:text-white transition">
                        Follow-up
                    </button>
                    <button onclick="loadTemplate('offer')" class="template-btn px-3 py-1.5 rounded-lg border border-slate-600 text-xs text-slate-300 hover:border-indigo-500 hover:text-white transition">
                        Special Offer
                    </button>
                </div>
            </div>
        </section>

        <!-- Generate Button -->
        <button onclick="generateEmails()" class="btn-primary w-full py-4 rounded-xl font-semibold text-white text-lg shadow-lg shadow-indigo-500/30 flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
            </svg>
            Generate Email Links
        </button>

        <!-- Progress Section -->
        <section id="progressSection" class="hidden glass-panel rounded-2xl p-4 space-y-3">
            <div class="flex justify-between items-center text-sm">
                <span class="text-slate-300">Campaign Progress</span>
                <span id="progressPercent" class="text-indigo-400 font-bold">0%</span>
            </div>
            <div class="w-full bg-slate-700 rounded-full h-2 overflow-hidden">
                <div id="progressBar" class="progress-bar h-full rounded-full" style="width: 0%"></div>
            </div>
            <div class="grid grid-cols-3 gap-2 text-center text-xs">
                <div class="bg-slate-800/50 rounded-lg p-2">
                    <div class="text-white font-semibold" id="progressAll">0</div>
                    <div class="text-slate-400">Total</div>
                </div>
                <div class="bg-yellow-500/10 rounded-lg p-2">
                    <div class="text-yellow-400 font-semibold" id="progressPending">0</div>
                    <div class="text-yellow-500/70">Pending</div>
                </div>
                <div class="bg-green-500/10 rounded-lg p-2">
                    <div class="text-green-400 font-semibold" id="progressSent">0</div>
                    <div class="text-green-500/70">Sent</div>
                </div>
            </div>
        </section>

        <!-- Filter Tabs & Search -->
        <section id="filterSection" class="hidden space-y-3">
            <!-- Search -->
            <div class="relative">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search emails..." 
                    oninput="filterEmails()"
                    class="input-field w-full rounded-xl pl-10 pr-4 py-3 text-sm"
                >
                <svg class="w-5 h-5 text-slate-500 absolute left-3 top-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>

            <!-- Filter Tabs -->
            <div class="flex mobile-scroll-x gap-2 border-b border-slate-700 pb-1">
                <button onclick="setFilter('all')" id="tabAll" class="filter-tab active flex-shrink-0 px-4 py-2 text-sm font-medium text-slate-400 border border-transparent rounded-t-lg flex items-center gap-2">
                    All
                    <span class="bg-slate-700 text-xs px-2 py-0.5 rounded-full" id="countAll">0</span>
                </button>
                <button onclick="setFilter('pending')" id="tabPending" class="filter-tab flex-shrink-0 px-4 py-2 text-sm font-medium text-slate-400 border border-transparent rounded-t-lg flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-yellow-500"></span>
                    Pending
                    <span class="bg-yellow-500/20 text-yellow-400 text-xs px-2 py-0.5 rounded-full" id="countPending">0</span>
                </button>
                <button onclick="setFilter('sent')" id="tabSent" class="filter-tab flex-shrink-0 px-4 py-2 text-sm font-medium text-slate-400 border border-transparent rounded-t-lg flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-green-500"></span>
                    Sent
                    <span class="bg-green-500/20 text-green-400 text-xs px-2 py-0.5 rounded-full" id="countSent">0</span>
                </button>
            </div>
        </section>

        <!-- Generated Emails List -->
        <section id="emailsSection" class="hidden space-y-3">
            <div class="flex justify-between items-center">
                <h3 class="text-lg font-semibold text-white">Email List</h3>
                <div class="flex gap-2">
                    <button onclick="exportCSV('all')" class="text-xs text-indigo-400 hover:text-indigo-300 flex items-center gap-1 px-3 py-1.5 rounded-lg hover:bg-indigo-500/10 transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                        </svg>
                        Export
                    </button>
                </div>
            </div>

            <div id="emailsList" class="space-y-2 max-h-96 overflow-y-auto">
                <!-- Email items will be inserted
